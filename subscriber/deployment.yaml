apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscriber
  namespace: k3s-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscriber
  template:
    metadata:
      labels:
        app: subscriber
    spec:
      containers:
        - name: subscriber
          image: misu11/mqtt-subscriber:latest
          env:
            - name: MQTT_HOST
              value: "mosquitto"
            - name: MQTT_PORT
              value: "1883"
            - name: MQTT_TOPIC
              value: "esp32/+/data"
            - name: MQTT_USER
              value: "espuser"
            - name: MQTT_PASS
              value: "1234"
            - name: MQTT_CLIENT_ID
              value: "rpi-subscriber"
